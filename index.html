<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>오늘의 명언 추천</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-top: #f7efe4;
      --bg-bottom: #dbe7d3;
      --panel: rgba(255, 252, 247, 0.82);
      --panel-border: rgba(98, 75, 46, 0.12);
      --text: #2d241d;
      --muted: #6f6255;
      --accent: #b66a2f;
      --accent-deep: #8f4d20;
      --accent-soft: #f1dcc7;
      --shadow: 0 24px 60px rgba(93, 71, 48, 0.16);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.9), transparent 28%),
        radial-gradient(circle at bottom right, rgba(182, 106, 47, 0.14), transparent 30%),
        linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .page {
      width: min(920px, 100%);
    }

    .card {
      position: relative;
      overflow: hidden;
      padding: 36px;
      border-radius: 32px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .card::before {
      width: 220px;
      height: 220px;
      right: -70px;
      top: -70px;
      background: radial-gradient(circle, rgba(182, 106, 47, 0.18), transparent 70%);
    }

    .card::after {
      width: 180px;
      height: 180px;
      left: -50px;
      bottom: -60px;
      background: radial-gradient(circle, rgba(123, 157, 102, 0.16), transparent 70%);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(182, 106, 47, 0.12);
      color: var(--accent-deep);
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(2.4rem, 5vw, 4.6rem);
      line-height: 0.96;
      letter-spacing: -0.05em;
    }

    .intro {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 1.04rem;
      line-height: 1.7;
    }

    .today {
      margin-top: 20px;
      color: var(--accent-deep);
      font-size: 0.96rem;
      font-weight: 700;
    }

    .quote-panel {
      margin-top: 30px;
      padding: 30px;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.7), rgba(255, 248, 239, 0.92)),
        var(--accent-soft);
      border: 1px solid rgba(182, 106, 47, 0.14);
      min-height: 280px;
      display: grid;
      gap: 18px;
      align-content: start;
    }

    .label {
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    blockquote {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      line-height: 1.45;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .author {
      margin: 0;
      color: var(--accent-deep);
      font-size: 1rem;
      font-weight: 700;
    }

    .message {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.98rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 26px;
    }

    button {
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .primary-btn {
      padding: 16px 24px;
      border-radius: 18px;
      color: #fffaf5;
      font-size: 1rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
      box-shadow: 0 18px 30px rgba(143, 77, 32, 0.22);
    }

    .secondary-btn {
      padding: 16px 22px;
      border-radius: 18px;
      color: var(--text);
      font-size: 0.98rem;
      font-weight: 800;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(98, 75, 46, 0.12);
    }

    button:hover {
      transform: translateY(-2px);
      filter: brightness(1.03);
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(98, 75, 46, 0.1);
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.94rem;
    }

    .fade-in {
      animation: fadeInUp 0.45s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .card {
        padding: 22px;
        border-radius: 24px;
      }

      .quote-panel {
        min-height: 320px;
        padding: 22px;
      }

      .controls {
        flex-direction: column;
      }

      .primary-btn,
      .secondary-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="card">
      <span class="eyebrow">Daily Quote</span>
      <h1>버튼을 누르면<br />오늘의 명언을 추천해드려요</h1>
      <p class="intro">
        짧은 문장 하나가 하루의 분위기를 바꿀 때가 있습니다.
        아래 버튼을 눌러 오늘 마음에 남길 명언을 만나보세요.
      </p>
      <p class="today" id="todayText"></p>

      <div class="quote-panel fade-in" id="quotePanel">
        <div class="label">Today's Pick</div>
        <blockquote id="quoteText">"오늘의 명언을 아직 추천받지 않았습니다."</blockquote>
        <p class="author" id="authorText">버튼을 눌러 시작해보세요.</p>
        <p class="message" id="messageText">지금의 기분에 어울리는 한 문장을 골라 보여드립니다.</p>
      </div>

      <div class="controls">
        <button class="primary-btn" id="recommendButton">오늘의 명언 추천받기</button>
        <button class="secondary-btn" id="resetButton">처음으로</button>
      </div>

      <div class="status" id="statusText">아직 명언이 표시되지 않았습니다.</div>
    </section>
  </main>

  <script>
    const quotes = [
      {
        text: "작은 진전도 진전이다.",
        author: "익명",
        message: "완벽하지 않아도 괜찮습니다. 오늘의 한 걸음이 내일의 흐름을 만듭니다."
      },
      {
        text: "성공은 매일 반복한 작은 노력들의 합이다.",
        author: "로버트 콜리어",
        message: "거창한 도약보다 꾸준한 반복이 더 멀리 데려다줍니다."
      },
      {
        text: "할 수 있다고 믿는 순간, 이미 절반은 이룬 것이다.",
        author: "시어도어 루스벨트",
        message: "시작하기 전의 마음가짐이 오늘의 속도를 결정합니다."
      },
      {
        text: "늦었다고 생각할 때가 아니라, 시작하기 가장 좋은 때다.",
        author: "익명",
        message: "타이밍보다 중요한 건 지금 움직이겠다는 결정입니다."
      },
      {
        text: "행복은 목적지가 아니라 살아가는 방식이다.",
        author: "버턴 힐스",
        message: "오늘 하루를 대하는 태도 자체가 이미 큰 의미가 있습니다."
      },
      {
        text: "넘어졌다는 사실보다 다시 일어나는 선택이 더 중요하다.",
        author: "빈스 롬바르디",
        message: "실수보다 회복력이 더 오래 남습니다. 오늘도 다시 가면 됩니다."
      }
    ];

    const recommendButton = document.getElementById("recommendButton");
    const resetButton = document.getElementById("resetButton");
    const quotePanel = document.getElementById("quotePanel");
    const quoteText = document.getElementById("quoteText");
    const authorText = document.getElementById("authorText");
    const messageText = document.getElementById("messageText");
    const statusText = document.getElementById("statusText");
    const todayText = document.getElementById("todayText");

    function formatToday() {
      const today = new Date();
      const year = today.getFullYear();
      const month = today.getMonth() + 1;
      const date = today.getDate();
      return `${year}년 ${month}월 ${date}일의 추천`;
    }

    function getRandomQuote() {
      const randomIndex = Math.floor(Math.random() * quotes.length);
      return quotes[randomIndex];
    }

    function renderQuote() {
      const quote = getRandomQuote();

      quotePanel.classList.remove("fade-in");
      void quotePanel.offsetWidth;
      quotePanel.classList.add("fade-in");

      quoteText.textContent = `"${quote.text}"`;
      authorText.textContent = `- ${quote.author}`;
      messageText.textContent = quote.message;
      statusText.textContent = "오늘의 명언이 준비되었습니다. 마음에 드는 문장을 천천히 읽어보세요.";
    }

    function resetQuote() {
      quoteText.textContent = "\"오늘의 명언을 아직 추천받지 않았습니다.\"";
      authorText.textContent = "버튼을 눌러 시작해보세요.";
      messageText.textContent = "지금의 기분에 어울리는 한 문장을 골라 보여드립니다.";
      statusText.textContent = "아직 명언이 표시되지 않았습니다.";
    }

    todayText.textContent = formatToday();
    recommendButton.addEventListener("click", renderQuote);
    resetButton.addEventListener("click", resetQuote);
  </script>
</body>
</html>
